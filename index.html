<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bombom - Controle de Trufas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100">
    <!-- Login Screen -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-lg w-96">
            <h1 class="text-2xl font-bold mb-6 text-center text-purple-600">🍫 Bombom</h1>
            <input type="email" id="email" placeholder="Email" class="w-full p-2 border rounded mb-4">
            <input type="password" id="password" placeholder="Senha" class="w-full p-2 border rounded mb-4">
            <button onclick="login()" class="w-full bg-purple-600 text-white p-2 rounded hover:bg-purple-700">Entrar</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
        <nav class="bg-purple-600 text-white p-4">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold">🍫 Bombom</h1>
                <div class="space-x-4">
                    <button onclick="showSection('vendas')" class="hover:underline">Vendas</button>
                    <button onclick="showSection('produtos')" class="hover:underline">Produtos</button>
                    <button onclick="showSection('relatorios')" class="hover:underline">Relatórios</button>
                    <button onclick="logout()" class="hover:underline">Sair</button>
                </div>
            </div>
        </nav>

        <div class="container mx-auto p-6">
            <!-- Seção Vendas -->
            <div id="vendas" class="section">
                <h2 class="text-2xl font-bold mb-4">Nova Venda</h2>
                <div class="bg-white p-6 rounded-lg shadow">
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block mb-2">Cliente</label>
                            <input type="text" id="clienteNome" class="w-full p-2 border rounded">
                        </div>
                        <div>
                            <label class="block mb-2">Forma de Pagamento</label>
                            <select id="formaPagamento" class="w-full p-2 border rounded">
                                <option value="PIX">PIX</option>
                                <option value="Dinheiro">Dinheiro</option>
                                <option value="Cartão">Cartão</option>
                            </select>
                        </div>
                    </div>
                    
                    <h3 class="font-bold mb-2">Itens</h3>
                    <div id="itensVenda" class="space-y-2 mb-4"></div>
                    <button onclick="adicionarItem()" class="bg-green-500 text-white px-4 py-2 rounded mb-4">+ Adicionar Item</button>
                    
                    <div class="border-t pt-4">
                        <p class="text-xl font-bold">Total: R$ <span id="totalVenda">0.00</span></p>
                        <button onclick="registrarVenda()" class="w-full bg-purple-600 text-white p-2 rounded mt-4 hover:bg-purple-700">
                            Finalizar Venda
                        </button>
                    </div>
                </div>
            </div>

            <!-- Seção Produtos -->
            <div id="produtos" class="section hidden">
                <h2 class="text-2xl font-bold mb-4">Produtos</h2>
                <button onclick="showFormProduto()" class="bg-green-500 text-white px-4 py-2 rounded mb-4">+ Novo Produto</button>
                <div id="listaProdutos" class="grid grid-cols-3 gap-4"></div>
            </div>

            <!-- Seção Relatórios -->
            <div id="relatorios" class="section hidden">
                <h2 class="text-2xl font-bold mb-4">Relatórios</h2>
                <div class="bg-white p-6 rounded-lg shadow">
                    <canvas id="graficoVendas" width="400" height="200"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
