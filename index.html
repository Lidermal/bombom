<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Trufas - TI Team</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍫</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .vertical-text { writing-mode: vertical-rl; transform: rotate(180deg); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 flex min-h-screen font-sans overflow-hidden">

    <div id="loadingOverlay" class="fixed inset-0 bg-black bg-opacity-80 z-50 flex flex-col items-center justify-center hidden">
        <i class="fa-solid fa-spinner fa-spin text-5xl text-white mb-4"></i>
        <p class="text-white font-medium text-lg">Sincronizando...</p>
    </div>

    <aside class="w-64 bg-gray-900 text-white flex flex-col shadow-2xl z-20">
        <div class="p-6 border-b border-gray-800 flex items-center space-x-3">
            <span class="text-3xl">🍫</span>
            <div><h1 class="text-xl font-bold">Controle TI</h1></div>
        </div>
        <nav class="flex-1 mt-4 space-y-1 px-2">
            <button onclick="mudarAba('dashboard', this)" class="menu-btn w-full flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 rounded">📊 Dashboard</button>
            <button onclick="mudarAba('semanal', this)" class="menu-btn w-full flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 rounded">📅 Controle Semanal</button>
            <button onclick="mudarAba('estoque', this)" class="menu-btn w-full flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 rounded">📦 Estoque</button>
            <button onclick="mudarAba('financeiro', this)" class="menu-btn w-full flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 rounded">💰 Financeiro</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center border-b">
            <h2 id="tituloAba" class="text-xl font-bold text-gray-800">Dashboard</h2>
            <select id="filtroSemana" class="bg-gray-100 border-none text-sm p-2 rounded cursor-pointer" onchange="carregarVisaoSemanal()"></select>
        </header>

        <div class="flex-1 overflow-y-auto p-6" id="containerPrincipal">
            <div id="aba-dashboard" class="aba-conteudo hidden fade-in grid grid-cols-1 md:grid-cols-4 gap-6"></div>
            <div id="aba-semanal" class="aba-conteudo hidden fade-in space-y-6"></div>
            <div id="aba-estoque" class="aba-conteudo hidden fade-in"></div>
            <div id="aba-financeiro" class="aba-conteudo hidden fade-in"></div>
        </div>
    </main>

    <script>
        // CONFIGURAÇÃO SUPABASE (Renomeado para supabaseClient para evitar conflito)
        const SUPABASE_URL = 'https://jyjrzczpuyomatskebfk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5anJ6Y3pwdXlvbWF0c2tlYmZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDExMDcsImV4cCI6MjA5NzM3NzEwN30.texrp9Ayt6rzmQyCYDS1UgJiKm6yUm4-PFq4lIj47hE';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let bancoProdutos = [];
        let bancoVendas = [];

        // Funções de Mensagem
        const alertaSucesso = (msg) => Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: msg, showConfirmButton: false, timer: 2000 });
        const alertaErro = (msg) => Swal.fire({ icon: 'error', title: 'Erro', text: msg });
        const toggleLoading = (show) => document.getElementById('loadingOverlay').classList.toggle('hidden', !show);

        // NAVEGAÇÃO Corrigida
        function mudarAba(abaId, el) {
            document.querySelectorAll('.aba-conteudo').forEach(a => a.classList.add('hidden'));
            document.getElementById('aba-' + abaId).classList.remove('hidden');
            document.getElementById('tituloAba').innerText = abaId.toUpperCase();
            
            if(abaId === 'dashboard') renderizarDashboard();
            if(abaId === 'semanal') carregarVisaoSemanal();
            if(abaId === 'estoque') renderizarEstoque();
        }

        async function sincronizarBanco() {
            toggleLoading(true);
            try {
                const { data: pData } = await supabaseClient.from('produtos').select('*').order('nome');
                const { data: vData } = await supabaseClient.from('vendas').select('*, itens_venda(*, produto:produtos(nome))').order('data_venda', { ascending: false });
                bancoProdutos = pData || [];
                bancoVendas = vData || [];
                
                // Força a renderização inicial
                mudarAba('dashboard');
            } catch(e) { alertaErro(e.message); }
            toggleLoading(false);
        }

        // Adicione aqui a lógica de renderização que criamos anteriormente...
        function carregarVisaoSemanal() {
            const isoStr = document.getElementById('filtroSemana').value;
            if(!isoStr) return;

            const [y, m, d] = isoStr.split('-');
            const semanaStart = new Date(y, m - 1, d, 0,0,0);
            const semanaEnd = new Date(semanaStart);
            semanaEnd.setDate(semanaEnd.getDate() + 6);
            semanaEnd.setHours(23,59,59);

            const vendasDaSemana = bancoVendas.filter(v => {
                const vd = new Date(v.data_venda + 'T12:00:00');
                return vd >= semanaStart && vd <= semanaEnd;
            });

            const diasUteis = ['Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira'];
            const container = document.getElementById('containerDiasSemana');
            container.innerHTML = '';

            for(let i=0; i<5; i++) {
                const diaAtual = new Date(semanaStart);
                diaAtual.setDate(diaAtual.getDate() + i);
                const isoDia = diaAtual.toISOString().split('T')[0];

                const vendasDoDia = vendasDaSemana.filter(v => v.data_venda === isoDia);
                
                let conteudoHTML = '';
                if(vendasDoDia.length === 0) {
                    conteudoHTML = `<p class="p-6 text-center text-gray-400 italic">Sem registros neste dia.</p>`;
                } else {
                    conteudoHTML = `<div class="divide-y divide-gray-100">`;
                    vendasDoDia.forEach(v => {
                        let badgeStatus = '';
                        if(v.status.includes('PIX')) badgeStatus = `<span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded font-bold">PIX</span>`;
                        else if(v.status.includes('ESPÉCIE')) badgeStatus = `<span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded font-bold">$$ Espécie</span>`;
                        else badgeStatus = `<span class="bg-red-100 text-red-800 text-xs px-2 py-1 rounded font-bold">Pendente</span>`;

                        // Aqui as tags limpas de "Itens Consumidos"
                        const listaItens = (v.itens_venda || []).map(iv => {
                            const nome = iv.produto ? iv.produto.nome : 'Produto Deletado';
                            return `<span class="inline-block bg-gray-100 text-gray-700 border border-gray-200 rounded px-2 py-1 text-xs font-semibold mr-2 mb-1">${iv.qtd}x ${nome}</span>`;
                        }).join('');

                        conteudoHTML += `
                            <div class="p-4 hover:bg-gray-50 transition flex flex-col md:flex-row justify-between md:items-center">
                                <div>
                                    <h4 class="font-bold text-gray-900 text-lg">${v.colaborador} ${badgeStatus}</h4>
                                    <div class="mt-2">${listaItens}</div>
                                    ${v.observacao ? `<p class="text-xs text-gray-500 mt-2 bg-yellow-50 inline-block px-2 py-1 rounded border border-yellow-100"><i class="fa-solid fa-note-sticky text-yellow-600 mr-1"></i> ${v.observacao}</p>` : ''}
                                </div>
                                <div class="mt-3 md:mt-0 text-right flex md:flex-col justify-between items-center md:items-end shrink-0">
                                    <span class="font-bold text-xl text-green-600">${formatarMoeda(v.total_devido)}</span>
                                    <button onclick="abrirModalVenda(${v.id})" class="text-blue-600 hover:underline text-sm font-medium mt-1"><i class="fa-solid fa-pen mr-1"></i> Editar</button>
                                </div>
                            </div>
                        `;
                    });
                    conteudoHTML += `</div>`;
                }

                // O layout final com a Lateral Vertical Escura
                container.innerHTML += `
                    <div class="flex bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-6">
                        <div class="bg-gray-900 w-12 flex items-center justify-center relative shrink-0">
                            <span class="text-xs font-bold text-white uppercase tracking-widest vertical-text absolute whitespace-nowrap transform -rotate-180">${diasUteis[i]}</span>
                        </div>
                        
                        <div class="flex-1 flex flex-col min-w-0">
                            <div class="bg-gray-50 border-b border-gray-200 px-4 py-2 flex justify-between items-center">
                                <span class="text-sm font-semibold text-gray-500">${formatarData(isoDia)}</span>
                                <button onclick="abrirModalVenda(null, '${isoDia}')" class="text-xs bg-gray-900 text-white px-2 py-1 rounded font-bold hover:bg-gray-800 transition">+ Registrar</button>
                            </div>
                            
                            <div class="flex-1">
                                ${conteudoHTML}
                            </div>
                        </div>
                    </div>
                `;
            }
        }
        window.onload = () => sincronizarBanco();
    </script>
</body>
</html>
